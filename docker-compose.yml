version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: workstack_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: workstack_redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: workstack_rabbitmq
    restart: always
    env_file:
      - .env
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port (http://localhost:15672)

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workstack_web
    #command: python manage.py runserver 0.0.0.0:8000
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles  # <-- Map the static folder to a shared volume
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workstack_celery
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq
  nginx:
      image: nginx:alpine
      container_name: workstack_nginx
      ports:
        - "80:80"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        # Mount the static files volume here later so Nginx can serve them directly
        - static_volume:/usr/share/nginx/html/static  # <-- Nginx reads from the exact same volume
      depends_on:
        - web
volumes:
  postgres_data:
  static_volume: # Define the shared volume


