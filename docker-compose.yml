version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: workstack_postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: workstack_redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: workstack_rabbitmq
    restart: always
    env_file:
      - .env
    ports:
      - "5672:5672"   # AMQP protocol port The message broker port
      - "15672:15672" # Management UI port (http://localhost:15672)

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workstack_web
    # ── Current: sync WSGI (development default) ──
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload
    # ── Future: WSGI + Gevent for legacy DRF at scale (see docs/WSGI_GEVENT_VS_ASGI.md) ──
    # command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --worker-class gevent --worker-connections 1000 --reload
    # ── Future: ASGI + Uvicorn for native async endpoints (see docs/WSGI_GEVENT_VS_ASGI.md) ──
    # command: gunicorn core.asgi:application --bind 0.0.0.0:8000 --workers 3 -k uvicorn.workers.UvicornWorker --reload
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles  # <-- Map the static folder to a shared volume
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workstack_celery
    # ── Current: prefork pool (one blocking task per worker process) ──
    command: celery -A core worker -l info
    # ── Future: gevent pool for I/O-bound LLM/MCP tasks (see docs/CELERY_GEVENT.md) ──
    # command: celery -A core worker -l info --pool=gevent --concurrency=500
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - rabbitmq
  nginx:
      image: nginx:alpine
      container_name: workstack_nginx
      ports:
        - "80:80"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        # Mount the static files volume here later so Nginx can serve them directly
        - static_volume:/usr/share/nginx/html/static  # <-- Nginx reads from the exact same volume
      depends_on:
        - web
  mcp_hr_daemon:
    build:
      context: ./backend
    container_name: workstack_mcp_hr
    command: python mcp_daemons/hr_server.py
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

  mcp_triage_daemon:
    build:
      context: ./backend
    container_name: workstack_mcp_triage
    command: python mcp_daemons/triage_server.py
    volumes:
      - ./backend:/app
    ports:
      - "8090:8090"
    env_file:
      - .env
    depends_on:
      - redis
volumes:
  postgres_data:
  static_volume: # Define the shared volume


